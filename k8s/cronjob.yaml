apiVersion: batch/v1
kind: CronJob
metadata:
  name: a2w-lucas
  namespace: a2w-lucas
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid  # Don't run if previous job still running
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0  # Don't retry failed jobs
      ttlSecondsAfterFinished: 300  # Clean up after 5 minutes
      template:
        spec:
          serviceAccountName: a2w-lucas
          restartPolicy: Never
          imagePullSecrets:
            - name: harbor-creds
          initContainers:
            - name: fix-permissions
              image: busybox
              command: ["sh", "-c", "chmod -R 777 /data"]
              volumeMounts:
                - name: data
                  mountPath: /data
              securityContext:
                runAsUser: 0
          containers:
            - name: lucas
              image: gdhb.goyoai.com/lukas/lucas:postgres-shadow
              imagePullPolicy: Always
              env:
                - name: TARGET_NAMESPACE
                  value: "default"
                - name: TARGET_NAMESPACES
                  value: "all"
                - name: SRE_MODE
                  value: "report"
                - name: SQLITE_PATH
                  value: "/data/lucas.db"
                - name: POSTGRES_HOST
                  value: "lucas-postgres"
                - name: POSTGRES_PORT
                  value: "5432"
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: lucas-postgres-auth
                      key: database
                      optional: true
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: lucas-postgres-auth
                      key: username
                      optional: true
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: lucas-postgres-auth
                      key: password
                      optional: true
                - name: POSTGRES_SSLMODE
                  value: "disable"
                - name: POSTGRES_SHADOW_VALIDATE
                  value: "false"
                - name: LLM_BACKEND
                  value: "openai-compatible"
                - name: LLM_PROVIDER
                  value: "openrouter"
                - name: LLM_MODEL
                  value: "stepfun/step-3.5-flash:free"
                - name: LLM_BASE_URL
                  value: "https://openrouter.ai/api/v1"
                - name: LLM_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: llm-auth
                      key: api-key
                      optional: true
                - name: OPENROUTER_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: llm-auth-openrouter
                      key: OPENROUTER_API_KEY
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: slack-webhook
                      key: webhook-url
                      optional: true
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: lucas-data
