apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: a2w-lucas
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      imagePullSecrets:
        - name: harbor-creds
      containers:
        - name: dashboard
          image: gdhb.goyoai.com/lukas/lucas-dashboard:postgres
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_HOST
              value: "lucas-postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: lucas-postgres-auth
                  key: database
                  optional: true
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: lucas-postgres-auth
                  key: username
                  optional: true
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lucas-postgres-auth
                  key: password
                  optional: true
            - name: POSTGRES_SSLMODE
              value: "disable"
            - name: PORT
              value: "8080"
            - name: AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: dashboard-auth
                  key: username
            - name: AUTH_PASS
              valueFrom:
                secretKeyRef:
                  name: dashboard-auth
                  key: password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
