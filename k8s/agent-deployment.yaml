apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2w-lucas-agent
  namespace: a2w-lucas
  labels:
    app: a2w-lucas-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a2w-lucas-agent
  template:
    metadata:
      labels:
        app: a2w-lucas-agent
    spec:
      serviceAccountName: a2w-lucas
      imagePullSecrets:
        - name: harbor-creds
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chmod -R 777 /data"]
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
      containers:
        - name: agent
          image: gdhb.goyoai.com/lukas/lucas-agent:postgres-shadow
          imagePullPolicy: Always
          env:
            # Namespace(s) to monitor - comma-separated for multiple
            - name: TARGET_NAMESPACE
              value: "default"
            - name: TARGET_NAMESPACES
              value: "default"
            # SRE_MODE: "autonomous" (can make changes) or "watcher" (read-only)
            - name: SRE_MODE
              value: "watcher"
            - name: LLM_BACKEND
              value: "openai-compatible"
            - name: LLM_PROVIDER
              value: "openrouter"
            - name: LLM_MODEL
              value: "stepfun/step-3.5-flash:free"
            - name: LLM_BASE_URL
              value: "https://openrouter.ai/api/v1"
            # Database path (shared with dashboard)
            - name: SQLITE_PATH
              value: "/data/lucas.db"
            - name: POSTGRES_HOST
              value: "lucas-postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: lucas-postgres-auth
                  key: database
                  optional: true
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: lucas-postgres-auth
                  key: username
                  optional: true
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lucas-postgres-auth
                  key: password
                  optional: true
            - name: POSTGRES_SSLMODE
              value: "disable"
            - name: POSTGRES_SHADOW_VALIDATE
              value: "false"
            - name: HOME
              value: "/home/claude"
            - name: SCAN_INTERVAL_SECONDS
              value: "3600"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-auth
                  key: api-key
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-auth-openrouter
                  key: OPENROUTER_API_KEY
            # Slack Bot credentials (required for interactive mode)
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-bot
                  key: bot-token
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-bot
                  key: app-token
            # Channel for alerts and scheduled scans
            - name: SRE_ALERT_CHANNEL
              valueFrom:
                secretKeyRef:
                  name: slack-bot
                  key: alert-channel
                  optional: true
            - name: SLACK_EMERGENCY_ACTIONS_ENABLED
              value: "true"
            - name: SLACK_ACTION_ALLOWED_CHANNELS
              value: "C0AKTLTBP4M"
            - name: SLACK_ACTION_ALLOWED_USERS
              value: ""
            - name: SLACK_ACTION_ALLOWED_NAMESPACES
              value: ""
            # Prompt file
            - name: PROMPT_FILE
              value: "/app/master-prompt-interactive-report.md"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import os; exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lucas-data
